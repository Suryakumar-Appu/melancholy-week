<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Melancholy Wk.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{background:#05030a;font-family:'Lora',serif;display:flex;justify-content:center;min-height:100vh}
#app{width:100%;max-width:430px;display:flex;flex-direction:column;background:#05030a}

/* SCENE — aspect ratio locked via padding trick, never reflowed */
#scene{
  position:relative;
  width:100%;
  padding-top:150.24%;
  overflow:hidden;
  background:#05030a;
  flex-shrink:0;
}

/* Everything inside scene is absolutely positioned */
#scene>*{position:absolute;top:0;left:0;width:100%;height:100%}

/* SKY — sits behind room, clipped to window cutout position */
#sky{
  z-index:1;
  top:20.6680%;
  left:38.0580%;
  width:22.4829%;
  height:19.6487%;
  background-size:cover;
  background-position:center;
  transition:background-image 0s, opacity 1.6s ease;
  opacity:1;
}

/* ROOM images — sit on top of sky, cover full scene */
.room{
  z-index:2;
  object-fit:cover;
  object-position:center top;
  opacity:0;
  transition:opacity 0.45s ease;
  display:block;
  width:100%;
  height:100%;
}
.room.on{opacity:1}

/* GLOOM overlay */
#gloom{
  z-index:3;
  background:rgba(4,2,10,0);
  transition:background 2s ease;
  pointer-events:none;
}

/* HUD */
#hud{
  z-index:4;
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  pointer-events:none;
  height:auto;
  width:100%;
}
.ht{font-family:'Space Mono',monospace;font-size:8px;color:rgba(210,185,148,0.52);letter-spacing:2px}

/* Away overlay */
#away{
  z-index:5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  background:rgba(4,2,9,0.4);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
#away.on{opacity:1}
#awt{font-family:'Space Mono',monospace;font-size:20px;color:rgba(140,170,195,0.62);letter-spacing:4px}
#awl{font-size:10px;font-style:italic;color:rgba(112,140,162,0.38);letter-spacing:1px}

/* Sleep overlay */
#sleepo{
  z-index:6;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  background:rgba(3,2,8,0.96);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s;
}
#sleepo.on{opacity:1;pointer-events:auto}
.sl{font-family:'Space Mono',monospace;font-size:8px;color:rgba(88,70,50,0.42);letter-spacing:4px}
#sc{display:flex;align-items:center;gap:10px}
#sc select,#sc button{
  background:transparent;
  border:1px solid rgba(85,62,40,0.32);
  color:rgba(132,106,70,0.55);
  font-family:'Space Mono',monospace;
  font-size:8px;
  padding:6px 10px;
  cursor:pointer;
  -webkit-appearance:none;
}

/* Day transition overlay */
#dayfade{
  z-index:7;
  background:rgba(4,2,9,0);
  pointer-events:none;
  transition:none;
}

/* CHOICE AREA — below scene, normal flow */
#choices{padding:14px 20px 32px;display:flex;flex-direction:column}
#sit{font-size:11px;font-style:italic;color:rgba(160,133,96,0.38);min-height:20px;margin-bottom:12px;line-height:1.6}
#cset{display:flex;flex-direction:column;gap:1px}
.cb{
  background:transparent;border:none;
  border-bottom:1px solid rgba(142,106,58,0.13);
  color:rgba(185,158,116,0.72);
  font-family:'Lora',serif;font-size:14px;
  padding:13px 4px;text-align:left;cursor:pointer;
  line-height:1.5;width:100%;transition:color 0.12s;
}
.cb:active,.cb:hover{color:rgba(215,190,150,0.96);border-color:rgba(142,106,58,0.32)}
.cb.res{color:rgba(138,112,76,0.36);pointer-events:none;border-color:transparent}

/* Ending screen */
#ending{
  display:none;position:fixed;inset:0;
  background:#04020a;z-index:30;
  overflow-y:auto;padding:44px 26px 64px;
  flex-direction:column;
}
#ending.on{display:flex}
#et{font-size:13px;color:transparent;line-height:1.92;white-space:pre-wrap;transition:color 2.8s ease}
#et.vis{color:rgba(188,160,122,0.76)}
#es{font-family:'Space Mono',monospace;font-size:8px;color:transparent;letter-spacing:2px;margin-top:30px;transition:color 2s ease 1s}
#es.vis{color:rgba(128,102,68,0.36)}

/* Toast */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-size:10px;font-style:italic;color:rgba(160,132,92,0.48);
  opacity:0;transition:opacity 0.4s;pointer-events:none;
  white-space:nowrap;z-index:25;
}
#toast.on{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="scene">
    <div id="sky"></div>
    <img class="room on" id="r-desk"      src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/desk.png"      alt="">
    <img class="room"    id="r-empty"     src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/empty.png"     alt="">
    <img class="room"    id="r-couch"     src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/couch.png"     alt="">
    <img class="room"    id="r-bed_sleep" src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/bed_sleep.png" alt="">
    <img class="room"    id="r-meditate"  src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/meditate.png"  alt="">
    <img class="room"    id="r-bed_read"  src="https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/bed_read.png"  alt="">
    <div id="gloom"></div>
    <div id="hud">
      <span class="ht" id="dlbl">day 1</span>
      <span class="ht" id="tlbl">morning</span>
    </div>
    <div id="away">
      <div id="awt">--:--</div>
      <div id="awl">outside</div>
    </div>
    <div id="sleepo">
      <div class="sl">asleep</div>
      <div id="sc">
        <span style="font-family:'Space Mono',monospace;font-size:7px;color:rgba(85,68,48,0.38)">wake at</span>
        <select id="alsel">
          <option value="7">7:00</option>
          <option value="8">8:00</option>
          <option value="9" selected>9:00</option>
          <option value="10">10:00</option>
          <option value="11">11:00</option>
        </select>
        <button id="wbtn">continue</button>
      </div>
    </div>
    <div id="dayfade"></div>
  </div>

  <div id="choices">
    <div id="sit"></div>
    <div id="cset"></div>
  </div>

  <div id="ending">
    <div id="et"></div>
    <div id="es">- melancholy wk.</div>
  </div>
</div>
<div id="toast"></div>

<script>
(function () {
'use strict';

/* ── SKY ── */
var SKIES = {
  night:     'https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/night.png',
  dawn:      'https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/dawn.png',
  morning:   'https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/morning.png',
  afternoon: 'https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/afternoon.png',
  evening:   'https://raw.githubusercontent.com/Suryakumar-Appu/melancholy-week/main/evening.png'
};
var curSky = '';
function skyForHour(h) {
  if (h >= 5  && h < 8)  return 'dawn';
  if (h >= 8  && h < 16) return 'morning';
  if (h >= 16 && h < 19) return 'afternoon';
  if (h >= 19 && h < 22) return 'evening';
  return 'night';
}
function showSky(name) {
  if (name === curSky) return;
  curSky = name;
  var el = document.getElementById('sky');
  el.style.opacity = '0';
  setTimeout(function () {
    el.style.backgroundImage = 'url(' + SKIES[name] + ')';
    el.style.opacity = '1';
  }, 400);
}

/* ── ROOM ── */
var ROOMS = ['desk','empty','couch','bed_sleep','meditate','bed_read'];
var curRoom = 'desk';
function showRoom(name) {
  if (name === curRoom) return;
  var prev = document.getElementById('r-' + curRoom);
  var next = document.getElementById('r-' + name);
  if (!next) return;
  if (prev) prev.classList.remove('on');
  next.classList.add('on');
  curRoom = name;
}

/* ── GLOOM ── */
function setGloom(sad, day) {
  var sn = Math.max(0, (sad - 38) / 62);
  var gl = Math.min(0.72, sn * 0.38 + (day - 1) * 0.018);
  document.getElementById('gloom').style.background = 'rgba(4,2,10,' + gl + ')';
}

/* ── STATE ── */
var G = {
  day:1, hour:8, min:0, sad:40,
  away:false, awayOut:false, sleeping:false, resolving:false,
  choicesLeft:7, ended:false,
  recentIds:[], counts:{},
  chains:{washMug:0,takeTrash:0,waterPlant:0,makeBed:0,
          goOutside:0,playGame:0,msgBack:0,shower:0,answerEmail:0},
  unlocked:{cookMeal:false,jog:false,playOnline:false,
            callSomeone:false,sitOutside:false},
  flags:{dishes:false,plantBad:false,unreadMsg:false,
         trash:false,noShower:false}
};

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function tStr() { return pad(G.hour) + ':' + pad(G.min); }
function tLbl() {
  return G.hour < 12 ? 'morning' : G.hour < 17 ? 'afternoon' :
         G.hour < 21 ? 'evening' : 'night';
}

function advTime(m) {
  G.min += m;
  while (G.min >= 60) { G.min -= 60; G.hour++; }
  G.min = Math.floor(G.min);
  if (G.hour >= 24) G.hour = 23;
  document.getElementById('dlbl').textContent = 'day ' + G.day;
  document.getElementById('tlbl').textContent = tLbl();
  showSky(skyForHour(G.hour));
  setGloom(G.sad, G.day);
}

/* ── CHOICES ── */
function cnt(id) { return G.counts[id] || 0; }

var ALL = [
  {id:'coffee',     lf:function(){return cnt('coffee')>=3?'make coffee. same as yesterday.':'make coffee';},                                           pool:'morn',dur:18,type:'d',state:'empty',       cd:2},
  {id:'shower',     lf:function(){return 'have a shower';},                                                                                            pool:'morn',dur:26,type:'m',state:'empty',       cd:3,ch:'shower'},
  {id:'makeBed',    lf:function(){return 'make the bed';},                                                                                             pool:'morn',dur:12,type:'m',state:'empty',       cd:3,ch:'makeBed'},
  {id:'openBlinds', lf:function(){return 'open the blinds a little';},                                                                                 pool:'morn',dur:8, type:'m',state:'desk',        cd:4},
  {id:'jog',        lf:function(){return 'go for a jog';},                                                                                             pool:'morn',dur:46,type:'m',state:'empty',       cd:2,ch:'goOutside',away:true,out:true,unlock:'jog'},
  {id:'sitOutCof',  lf:function(){return 'sit outside with your coffee';},                                                                             pool:'morn',dur:40,type:'m',state:'empty',       cd:2,away:true,out:true,unlock:'sitOutside'},
  {id:'laptop',     lf:function(){return 'open the laptop';},                                                                                          pool:'any', dur:80,type:'m',state:'desk',        cd:1,ch:'answerEmail'},
  {id:'project',    lf:function(){return 'work on the monthly project';},                                                                              pool:'day', dur:85,type:'m',state:'desk',        cd:2,ch:'answerEmail'},
  {id:'standup',    lf:function(){return 'join the standup';},                                                                                         pool:'std', dur:30,type:'m',state:'desk',        cd:99,ch:'answerEmail'},
  {id:'scroll',     lf:function(){return cnt('scroll')>=3?'scroll again. nothing new.':'open instagram. close instagram.';},                          pool:'any', dur:50,type:'t',state:'couch',       cd:1},
  {id:'phone',      lf:function(){return 'check your phone';},                                                                                         pool:'any', dur:22,type:'t',state:'couch',       cd:1},
  {id:'seeMsg',     lf:function(){return "see a message. don't reply.";},                                                                             pool:'any', dur:14,type:'t',state:'couch',       cd:2},
  {id:'reply',      lf:function(){return "reply to the message you've been ignoring";},                                                               pool:'any', dur:24,type:'m',state:'desk',        cd:2,ch:'msgBack'},
  {id:'order',      lf:function(){return cnt('order')>=2?'order your usual':'order food';},                                                           pool:'any', dur:14,type:'d',state:'desk',        cd:2,box:true},
  {id:'waterPlant', lf:function(){return 'water the plant';},                                                                                         pool:'day', dur:8, type:'m',state:'empty',       cd:2,ch:'waterPlant'},
  {id:'washMug',    lf:function(){return cnt('washMug')>=2?'the mug is clean at least':'wash the mug';},                                             pool:'day', dur:10,type:'m',state:'empty',       cd:2,ch:'washMug'},
  {id:'trash',      lf:function(){return 'take the trash out';},                                                                                       pool:'day', dur:14,type:'m',state:'empty',       cd:3,away:true,ch:'takeTrash'},
  {id:'outside',    lf:function(){return 'go outside, just for a bit';},                                                                              pool:'day', dur:58,type:'m',state:'empty',       cd:2,away:true,out:true,ch:'goOutside'},
  {id:'game',       lf:function(){return cnt('game')>=3?"same server, same people who don't know your name":'play a game';},                         pool:'any', dur:82,type:'d',state:'couch',       cd:1,ch:'playGame'},
  {id:'online',     lf:function(){return 'join a game with others';},                                                                                 pool:'any', dur:72,type:'m',state:'couch',       cd:2,unlock:'playOnline'},
  {id:'meditate',   lf:function(){return 'just sit for a while';},                                                                                    pool:'any', dur:28,type:'m',state:'meditate',    cd:2},
  {id:'comic',      lf:function(){return cnt('comic')>=2?'read the weekly comic again':'read the weekly comic';},                                    pool:'any', dur:42,type:'d',state:'bed_read',    cd:2},
  {id:'doodle',     lf:function(){return 'doodle something in the corner of a notebook';},                                                            pool:'any', dur:22,type:'m',state:'couch',       cd:2},
  {id:'music',      lf:function(){return cnt('music')>=2?'put on the same playlist again':'put on a playlist you made two years ago';},              pool:'any', dur:36,type:'m',state:'couch',       cd:2},
  {id:'lie',        lf:function(){return 'lie down for a minute';},                                                                                    pool:'any', dur:46,type:'t',state:'bed_sleep',  cd:1},
  {id:'stare',      lf:function(){return 'stare at nothing in particular';},                                                                          pool:'any', dur:26,type:'t',state:'desk',        cd:1},
  {id:'water',      lf:function(){return 'drink some water';},                                                                                        pool:'any', dur:5, type:'m',state:'desk',        cd:1},
  {id:'call',       lf:function(){return 'actually call someone';},                                                                                   pool:'any', dur:36,type:'m',state:'couch',       cd:3,unlock:'callSomeone'},
  {id:'cook',       lf:function(){return 'cook something proper';},                                                                                   pool:'eve', dur:55,type:'m',state:'empty',       cd:2,unlock:'cookMeal'},
  {id:'watch',      lf:function(){return cnt('watch')>=2?'watch the same show again':'watch something. anything.';},                                 pool:'eve', dur:80,type:'d',state:'couch',       cd:1},
  {id:'oneMore',    lf:function(){return 'one more episode';},                                                                                        pool:'eve', dur:50,type:'t',state:'couch',       cd:1},
  {id:'leftovers',  lf:function(){return 'eat the leftovers cold';},                                                                                  pool:'eve', dur:10,type:'d',state:'desk',        cd:2,box:true},
  {id:'tea',        lf:function(){return 'make tea';},                                                                                                pool:'eve', dur:15,type:'d',state:'empty',       cd:2},
  {id:'sitDark',    lf:function(){return 'sit in the dark for a bit';},                                                                               pool:'eve', dur:25,type:'t',state:'meditate',    cd:2},
  {id:'latePhone',  lf:function(){return "it's 2am. you're still on your phone.";},                                                                  pool:'late',dur:54,type:'t',state:'couch',       cd:1},
  {id:'ceiling',    lf:function(){return 'stare at the ceiling';},                                                                                    pool:'late',dur:40,type:'t',state:'bed_sleep',  cd:1},
  {id:'sleep',      lf:function(){return 'go to sleep';},                                                                                             pool:'slp', dur:0, type:'sleep',state:'bed_sleep'},
  {id:'trySleep',   lf:function(){return 'try to sleep';},                                                                                            pool:'late',dur:0, type:'sleep',state:'bed_sleep'},
  {id:'dishes',     lf:function(){return 'the dishes are piling up';},                                                                                pool:'any', dur:28,type:'m',state:'empty',       cd:99,flag:'dishes'},
  {id:'badPlant',   lf:function(){return 'the plant really looks bad';},                                                                              pool:'any', dur:8, type:'m',state:'empty',       cd:99,flag:'plantBad',ch:'waterPlant'},
  {id:'unread',     lf:function(){return "there's a message you haven't opened";},                                                                    pool:'any', dur:18,type:'t',state:'couch',       cd:99,flag:'unreadMsg'},
  {id:'trashBig',   lf:function(){return 'the trash really needs to go';},                                                                            pool:'any', dur:14,type:'m',state:'empty',       cd:99,flag:'trash',away:true,ch:'takeTrash'},
  {id:'noShower',   lf:function(){return "you haven't showered in a while";},                                                                         pool:'morn',dur:26,type:'m',state:'empty',       cd:99,flag:'noShower',ch:'shower'}
];

function avail() {
  var h = G.hour, m = G.min;
  var isSleep = h >= 21 || h < 5;
  var isLate  = h >= 22 || h < 5;
  var isEve   = h >= 17 && h < 23;
  var isMorn  = h >= 5  && h < 13;
  var isDay   = h >= 9  && h < 20;
  var isStd   = h === 9 && m >= 28 && m <= 45;

  var pool = ALL.filter(function (c) {
    if (c.unlock && !G.unlocked[c.unlock]) return false;
    if (c.flag   && !G.flags[c.flag])     return false;
    if (c.pool === 'slp')  return isSleep;
    if (c.pool === 'late') return isLate;
    if (c.pool === 'std')  return isStd;
    if (c.pool === 'eve')  return isEve;
    if (c.pool === 'morn') return isMorn;
    if (c.pool === 'day')  return isDay;
    return true;
  });

  pool = pool.filter(function (c) {
    if (c.type === 'sleep') return true;
    var idx = G.recentIds.indexOf(c.id);
    return idx === -1 || idx >= (c.cd || 2);
  });

  pool = pool.sort(function () { return Math.random() - 0.5; });

  var max = G.sad > 82 ? 2 : G.sad > 65 ? 3 : 4;
  var sleepC = null;
  pool.forEach(function (c) { if (c.type === 'sleep' && !sleepC) sleepC = c; });
  var rest = pool.filter(function (c) { return c.type !== 'sleep'; }).slice(0, max);
  return (isSleep && sleepC) ? rest.concat([sleepC]) : rest;
}

var SITS = {
  morning:   ['another morning','the day is waiting','morning'],
  afternoon: ['the afternoon','midday','later'],
  evening:   ['evening','getting late','the day winds down'],
  night:     ['late','quiet now','']
};
var cur = [];

function render(res, lbl) {
  var cs = document.getElementById('cset');
  cs.innerHTML = '';
  if (G.sleeping || G.ended) return;
  if (res) {
    var b = document.createElement('button');
    b.className = 'cb res';
    b.textContent = (lbl || '') + '...';
    cs.appendChild(b);
    return;
  }
  cur.forEach(function (c) {
    var b = document.createElement('button');
    b.className = 'cb';
    b.textContent = c.lf();
    b.addEventListener('click', function () { act(c); });
    cs.appendChild(b);
  });
}

function act(c) {
  if (G.resolving || G.ended) return;
  if (c.type === 'sleep') { doSleep(); return; }
  G.resolving = true;
  G.choicesLeft--;
  G.counts[c.id] = (G.counts[c.id] || 0) + 1;
  G.recentIds.unshift(c.id);
  if (G.recentIds.length > 12) G.recentIds.pop();

  showRoom(c.state || 'desk');

  if (c.away || c.out) {
    G.away = true; G.awayOut = !!c.out;
    document.getElementById('away').className = 'on';
    document.getElementById('awl').textContent = c.out ? 'outside' : 'away';
    document.getElementById('awt').textContent = tStr();
  }

  if (c.box) G.boxes = (G.boxes || 0) + 1;
  if (c.ch)  G.chains[c.ch] = (G.chains[c.ch] || 0) + 1;
  if (c.flag) G.flags[c.flag] = false;
  checkUnlocks();
  render(true, c.lf());

  var delta = 0;
  if (c.type === 'm') {
    var r = Math.random();
    delta = r < 0.38 ? -(2 + r * 9) : r < 0.6 ? (Math.random() - 0.5) * 2 : 1 + Math.random() * 5;
  } else if (c.type === 't') {
    delta = Math.random() < 0.65 ? 2 + Math.random() * 10 : -(1 + Math.random() * 3);
  } else {
    delta = (Math.random() - 0.44) * 4;
  }

  var realMs = c.type === 't' ? 2000 : c.type === 'm' ? 1400 : 1000;
  var steps = 0, total = Math.max(5, Math.ceil(c.dur / 2));
  var iv = setInterval(function () {
    advTime(2);
    if (G.awayOut) document.getElementById('awt').textContent = tStr();
    steps++;
    if (steps >= total) { clearInterval(iv); finish(c, delta); }
  }, realMs / total);
}

function finish(c, delta) {
  G.sad = Math.max(38, Math.min(100, G.sad + delta));
  G.away = false; G.awayOut = false; G.resolving = false;
  document.getElementById('away').className = '';
  if (c.away || c.out) showRoom('desk');
  setGloom(G.sad, G.day);
  if (G.choicesLeft <= 0 || G.hour >= 23) { endDay(); return; }
  cur = avail();
  var sl = SITS[tLbl()] || SITS.morning;
  document.getElementById('sit').textContent = sl[Math.floor(Math.random() * sl.length)];
  render(false);
}

function doSleep() {
  G.sleeping = true;
  showRoom('bed_sleep');
  document.getElementById('sleepo').className = 'on';
  document.getElementById('cset').innerHTML = '';
  document.getElementById('sit').textContent = '';
}

document.getElementById('wbtn').addEventListener('click', function () {
  var a = parseInt(document.getElementById('alsel').value);
  G.min = 0; G.hour = a;
  G.sad = Math.max(38, Math.min(100, G.sad + (-(2 + Math.random() * 9) + (Math.random() - 0.38) * 8)));
  G.sleeping = false;
  document.getElementById('sleepo').className = '';
  endDay();
});

function checkUnlocks() {
  var c = G.chains;
  if (!G.unlocked.cookMeal    && c.washMug   >= 2) G.unlocked.cookMeal    = true;
  if (!G.unlocked.jog         && c.goOutside >= 3) G.unlocked.jog         = true;
  if (!G.unlocked.playOnline  && c.playGame  >= 3) G.unlocked.playOnline  = true;
  if (!G.unlocked.callSomeone && c.msgBack   >= 3) G.unlocked.callSomeone = true;
  if (!G.unlocked.sitOutside  && c.goOutside >= 2 && c.washMug >= 2) G.unlocked.sitOutside = true;
}

function fadeDay(cb) {
  var fd = document.getElementById('dayfade');
  fd.style.transition = 'none';
  fd.style.background = 'rgba(4,2,9,0)';
  void fd.offsetWidth;
  fd.style.transition = 'background 0.6s ease';
  fd.style.background = 'rgba(4,2,9,1)';
  setTimeout(function () {
    cb();
    fd.style.transition = 'background 0.6s ease';
    fd.style.background = 'rgba(4,2,9,0)';
  }, 650);
}

function endDay() {
  if (G.day >= 7) { doEnding(); return; }
  fadeDay(function () {
    G.day++; G.hour = 8; G.min = 0;
    G.choicesLeft = 6 + Math.floor(Math.random() * 4);
    G.sleeping = false; G.resolving = false;
    G.flags.dishes    = G.chains.washMug    < G.day - 2 && G.day >= 3;
    G.flags.plantBad  = G.chains.waterPlant < G.day - 2 && G.day >= 3;
    G.flags.unreadMsg = G.day >= 3 && G.chains.msgBack < 1;
    G.flags.trash     = G.chains.takeTrash  < 1 && G.day >= 2;
    G.flags.noShower  = G.chains.shower < G.day - 3 && G.day >= 4;
    showRoom('desk');
    showSky(skyForHour(8));
    setGloom(G.sad, G.day);
    document.getElementById('dlbl').textContent = 'day ' + G.day;
    document.getElementById('tlbl').textContent = 'morning';
    cur = avail();
    document.getElementById('sit').textContent = 'day ' + G.day;
    render(false);
  });
}

function doEnding() {
  G.ended = true;
  fadeDay(function () {
    setTimeout(function () {
      document.getElementById('choices').style.display = 'none';
      var el = document.getElementById('ending');
      el.className = 'on';
      var lines = [
        "Hi There,", "",
        "Melancholy Wk. isn't really a game, its an anti-game. I love playing and building games. And there are many great worlds that I have lost myself into, and mediocre worlds of my own that I have built.", "",
        "Over the past 2 years, I have struggled with my mental health. I haven't quite found my fit in this world yet, and I see myself slipping and spiraling but also hoping, wanting, and growing.", "",
        "My most depressed days are the ones that are actually filled with a lot of color and the days that I am actually doing okay, my world is quite black/white. But this isn't true to all days, I could have colorful happy days and extremely sad dark days as well.", "",
        "Depression is a struggle because the solutions always seem easy - seek help, go out, start a hobby, talk to someone, and so on. But the act of doing any of those things is such a mountain to climb on most days.", "",
        "So thats how Melancholy Wk. came to be. An effort into showing how depression can look like and manifest, how agency to act isn't a guarantee for success. Also a visual way in which it can help someone else articulate the same struggles that I have faced.", "",
        "So if a friend did share this with you, do check in on them.", "",
        "Take Care :))"
      ];
      document.getElementById('et').textContent = lines.join("\n");
      setTimeout(function () {
        document.getElementById('et').className = 'vis';
        document.getElementById('es').className = 'vis';
      }, 300);
    }, 200);
  });
}

function toast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.className = 'on';
  setTimeout(function () { t.className = ''; }, 4000);
}

['desk','empty','couch','bed_sleep','meditate','bed_read'].forEach(function(n){
  var el = document.getElementById('r-' + n);
  if (el && el.src) { var tmp = new Image(); tmp.src = el.src; }
});
showSky(skyForHour(G.hour));
setGloom(G.sad, G.day);
cur = avail();
document.getElementById('sit').textContent = 'day 1';
render(false);

})();
</script>
